name: trackify
description: Trackify - Real-Time Bus Tracking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  # Location
  geolocator: ^11.0.0
  # Networking
  http: ^1.1.0
  socket_io_client: ^2.0.3+1
  # State management
  provider: ^6.1.1
  # Storage
  shared_preferences: ^2.2.2
  # UI
  cupertino_icons: ^1.0.6
  flutter_spinkit: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
